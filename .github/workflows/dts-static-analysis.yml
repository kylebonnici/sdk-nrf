name: DTS static analysis

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.dts"
      - "**/*.dtsi"

jobs:
  compliance_job:
    runs-on: ubuntu-24.04
    name: DTS Nordic boards static analysis
    steps:
    - name: Update PATH for west
      run: |
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Checkout sources
      uses: nrfconnect/action-checkout-west-update@main
      with:
        git-fetch-depth: 0
        git-ref: ${{ github.event.pull_request.head.sha }}
        rebase: true

    - name: Collect DTS files
      id: collect_dts
      run: |
        set -e

        files=""
        find ./ncs/nrf/boards/nordic -type f -name "*.dts" | sort | tee dts_files.txt
  
        if [ ! -s dts_files.txt ]; then
          echo "No DTS files found!"
          exit 1
        fi

        echo "Total DTS/DTSI files: $(wc -l < dts_files.txt)"

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dts-linter
      run: |
        npm install -g dts-linter@beta

    - name: Run dts-linter
      run: |
        set -e

        args=()
        while IFS= read -r file; do
          args+=( "--file" "$file" )
        done < dts_files.txt

        set -x
        dts-linter \
          --diagnosticsFull \
          "${args[@]}" \
          --include ./ncs/zephyr/dts \
          --include ./ncs/zephyr/dts/arm \
          --include ./ncs/zephyr/dts/arm64 \
          --include ./ncs/zephyr/dts/riscv \
          --include ./ncs/zephyr/dts/common \
          --include ./ncs/zephyr/dts/vendor \
          --include ./ncs/zephyr/include \
          --include ./ncs/zephyr/include/zephyr \
          --binding ./ncs/zephyr/dts/bindings \
          --include ./ncs/nrf/dts \
          --include ./ncs/nrf/dts/arm \
          --include ./ncs/nrf/dts/arm64/ \
          --include ./ncs/nrf/dts/riscv \
          --include ./ncs/nrf/dts/common \
          --include ./ncs/nrf/dts/vendor  \
          --binding ./ncs/nrf/dts/bindings

